project_name: main_cifar10_20clients

algorithm: fedu
num_clients: 100
n_rounds: 200 
m: 0.3
local_epochs: 5 
agg: mtl

#fedu params
lambda_: 0.03

# FLearner arguments
client_selector: BaseClientSelector
writer: WandbWriter


# save and log directories
root_dir: /scratch/project_2009050/
save_dir : models
res_dir: results
log_dir: logs
state_dir: aggregated_model_

# metrics
training_metrics: [accuracy_score]
test_metrics: [accuracy_score]

data:
  data_dir: /scratch/project_2009050/
  modality: [Vision]
  batch_size: 32
  name: cifar10
  partitioner: 
    name: PathologicalPartitioner
    kwargs:
      num_classes_per_partition: 2
      class_assignment_mode: first-deterministic
  num_classes: 10
  classes: [plane, car, bird, cat, deer, dog, frog, horse, ship, truck]


model:
  name: lenet_cifar10
  img_size: [3, 32, 32]
  hidden_dim: 512
  num_classes: 10


# optimzer configuration
optimizer:
  name: SGD
  lr: 0.01
  weight_decay: 0.0