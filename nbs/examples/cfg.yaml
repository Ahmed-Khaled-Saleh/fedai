project_name: main_cifar10_20clients

algorithm: sfmtl
num_clients: 20
n_rounds: 200 
m: 1.0
local_epochs: 5 
agg: mtl
graph_type: similarity
lambda_: 0.03
alpha: 0.49
lambda_anchor: 0.1
momentum_anchor: 0.5

random_seed: 42
client_selector: BaseClientSelector
writer: WandbWriter

root_dir: /scratch/project_2009050/
save_dir : models
res_dir: results
log_dir: logs
state_dir: aggregated_model_

training_metrics: [accuracy_score]
test_metrics: [accuracy_score]

data:
  data_dir: /scratch/project_2009050/
  modality: [Vision]
  batch_size: 32
  name: cifar10
  partitioner: 
    name: PathologicalPartitioner
    kwargs:
      num_classes_per_partition: 2
      # partition_by: y
      # num_partitions: 20
  alpha: 0.1
  train_ratio: 0.75
  num_classes: 10
  classes: [plane, car, bird, cat, deer, dog, frog, horse, ship, truck]


model:
  name: lenet_fedavg
  img_size: [3, 32, 32]
  hidden_dim: 512
  num_classes: 10
  # grad_norm_clip: 1.0


optimizer:
  name: SGD
  lr: 0.05
  weight_decay: 0.0